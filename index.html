<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AQUILA OA-001 | Pro-Mobile Interface</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #020406; --card: #0a121b; --text: #a9b9c9; --accent: #00ffff;
            --accent-glow: rgba(0, 255, 255, 0.4); --red: #ff3333; --green: #00ff88;
            --border: #1a2a3a; --nav-size: 70px;
        }

        body.light-theme {
            --bg: #e0e4e8; --card: #ffffff; --text: #2c3e50; --accent: #0077be;
            --border: #bdc3c7;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body {
            font-family: 'Roboto Mono', monospace; background: var(--bg); color: var(--text);
            margin: 0; display: flex; height: 100vh; width: 100vw; overflow: hidden;
            flex-direction: row; /* Default Desktop/Landscape */
        }

        /* --- NAVIGAZIONE (SIDEBAR) --- */
        aside {
            width: 200px; background: var(--card); border-right: 1px solid var(--border);
            display: flex; flex-direction: column; flex-shrink: 0; z-index: 100;
        }

        .nav-item {
            padding: 20px; cursor: pointer; border-left: 3px solid transparent;
            text-transform: uppercase; letter-spacing: 1px; font-size: 0.75em;
            transition: 0.2s;
        }

        .nav-item.active { border-left-color: var(--accent); color: var(--accent); background: rgba(0,255,255,0.05); }

        /* --- LAYOUT PRINCIPALE --- */
        main { flex-grow: 1; display: flex; flex-direction: column; min-width: 0; }
        
        header { 
            height: 50px; padding: 0 20px; background: var(--card); border-bottom: 1px solid var(--border);
            display: flex; justify-content: space-between; align-items: center; font-size: 0.7em;
            flex-shrink: 0;
        }

        .content-area { flex-grow: 1; overflow-y: auto; padding: 15px; }

        .page { display: none; width: 100%; }
        .page.active { display: block; }

        /* --- DASHBOARD --- */
        .drone-view {
            position: relative; width: 100%; height: 250px;
            background: rgba(0,255,255,0.02); border: 1px solid var(--border);
            display: flex; align-items: center; justify-content: center;
        }

        .health-tag {
            position: absolute; padding: 3px 6px; border: 1px solid var(--red);
            background: rgba(0,0,0,0.8); font-size: 0.55em; color: var(--red);
        }
        .tag-core { border-color: var(--accent); color: var(--accent); top: 50%; left: 50%; transform: translate(-50%, -50%); }

        /* --- GRID DATI --- */
        .grid-stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr)); gap: 10px; margin-top: 15px; }
        .stat-card { background: var(--card); padding: 12px; border: 1px solid var(--border); text-align: center; }
        .stat-value { display: block; font-size: 1.1em; color: var(--accent); }

        /* --- FIX MOBILE VERTICALE (Smartphone Portrait) --- */
        @media (max-width: 600px) and (orientation: portrait) {
            body { flex-direction: column; }
            aside {
                width: 100%; height: var(--nav-size); flex-direction: row;
                border-right: none; border-top: 1px solid var(--border);
                position: fixed; bottom: 0; order: 2;
            }
            .nav-item { 
                flex: 1; padding: 0; display: flex; align-items: center; justify-content: center;
                border-left: none; border-top: 3px solid transparent; font-size: 0.6em;
            }
            .nav-item.active { border-top-color: var(--accent); }
            main { height: calc(100vh - var(--nav-size)); }
            .content-area { padding-bottom: 20px; }
        }

        /* --- FIX MOBILE ORIZZONTALE (Smartphone Landscape) --- */
        @media (max-height: 450px) and (orientation: landscape) {
            aside { width: 80px; } /* Sidebar stretta per salvare spazio */
            .nav-item { padding: 15px 5px; font-size: 0.55em; text-align: center; }
            header { height: 35px; font-size: 0.6em; }
            .drone-view { height: 160px; } /* Drone più basso per vedere i dati sotto */
            .grid-stats { grid-template-columns: repeat(4, 1fr); } /* Dati su una riga sola */
            .stat-card { padding: 5px; }
            .stat-value { font-size: 0.9em; }
        }

        /* Tabelle */
        .table-container { width: 100%; overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; min-width: 450px; font-size: 0.7em; }
        td, th { padding: 10px; border-bottom: 1px solid var(--border); text-align: left; }
    </style>
</head>
<body>

    <aside>
        <div class="nav-item active" onclick="showPage('dashboard', this)">Dash</div>
        <div class="nav-item" onclick="showPage('mappa', this)">Mappa</div>
        <div class="nav-item" onclick="showPage('log', this)">Log</div>
        <div class="nav-item" onclick="showPage('analisi', this)">Dati</div>
        <div class="nav-item" onclick="showPage('impostazioni', this)">Set.</div>
    </aside>

    <main>
        <header>
            <div>SISTEMA: <span style="color:var(--accent)">AQUILA_001</span></div>
            <div id="clock">12:00:00 UTC</div>
        </header>

        <div class="content-area">
            <div id="dashboard" class="page active">
                <div class="drone-view">
                    <div class="health-tag" style="top:10%; left:10%">ALA DX: 12%</div>
                    <div class="health-tag" style="top:10%; right:10%">ALA SX: 08%</div>
                    <div class="health-tag tag-core">CORE: 10%</div>
                    <div style="font-size: 0.5em; color: var(--border);">[ DIAGNOSTICA ATTIVA ]</div>
                </div>
                <div class="grid-stats">
                    <div class="stat-card">BATTERIA <span class="stat-value">05%</span></div>
                    <div class="stat-card">ALTITUDINE <span class="stat-value">1240m</span></div>
                    <div class="stat-card">VELOCITÀ <span class="stat-value">140km/h</span></div>
                    <div class="stat-card">MOTORE <span class="stat-value" style="color:var(--red)">PESSIMO</span></div>
                </div>
            </div>

            <div id="mappa" class="page">
                <div style="width:100%; height:200px; border:1px solid var(--border); background:#000; display:flex; align-items:center; justify-content:center;">
                    <span style="font-size:0.6em; color:var(--accent)">CARICAMENTO MAPPA_DRONE.PNG...</span>
                </div>
            </div>

            <div id="log" class="page">
                <div class="table-container">
                    <table id="logTable">
                        <thead><tr><th>TIME</th><th>EVENTO</th><th>STATUS</th></tr></thead>
                        <tbody id="logBody"></tbody>
                    </table>
                </div>
            </div>

            <div id="analisi" class="page">
                <div class="grid-stats">
                    <div class="stat-card">TEMP NUCLEO <span class="stat-value">88°C</span></div>
                    <div class="stat-card">COMM LINK <span class="stat-value" style="color:var(--red)">12%</span></div>
                </div>
            </div>

            <div id="impostazioni" class="page">
                <button onclick="toggleTheme()" style="width:100%; padding:15px; background:var(--accent); border:none; font-family:inherit; font-weight:bold;">SWITCH THEME</button>
            </div>
        </div>
    </main>

    <script>
        function showPage(id, el) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            el.classList.add('active');
        }

        function toggleTheme() { document.body.classList.toggle('light-theme'); }

        async function loadLogs() {
            try {
                const response = await fetch('log_drone.json');
                const data = await response.json();
                document.getElementById('logBody').innerHTML = data.map(e => `
                    <tr><td>${e.timestamp}</td><td>${e.tipo}</td><td style="color:var(--red)">${e.stato}</td></tr>
                `).join('');
            } catch (e) { console.log("JSON non trovato"); }
        }

        setInterval(() => {
            document.getElementById('clock').innerText = new Date().toLocaleTimeString() + " UTC";
        }, 1000);

        window.onload = loadLogs;
    </script>
</body>
</html>
