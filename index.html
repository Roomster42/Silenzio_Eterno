<!DOCTYPE html>
<html lang="it" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>UAV Combat Simulation Access</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <style>
        /* --- Variabili di Tema: High-Tech / Mil-Spec --- */
        :root {
            --bg-base: #0a0e17;
            --bg-panel: #111827;
            --text-primary: #00ffcc;
            --text-secondary: #00b38f;
            --text-light: #e5e7eb;
            --border-color: #00ffcc40;
            --alert-red: #ff3333;
            --warn-yellow: #ffcc00;
            --ok-green: #00ff66;
            --font-main: 'Courier New', Courier, monospace;
        }

        [data-theme="light"] {
            --bg-base: #e5e7eb;
            --bg-panel: #ffffff;
            --text-primary: #111827;
            --text-secondary: #374151;
            --text-light: #1f2937;
            --border-color: #9ca3af;
            --alert-red: #dc2626;
            --warn-yellow: #d97706;
            --ok-green: #16a34a;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
        }

        body {
            font-family: var(--font-main);
            background-color: var(--bg-base);
            color: var(--text-primary);
            overflow: hidden;
            transition: background-color 0.3s, color 0.3s;
            height: 100vh;
            width: 100vw;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* --- STILI PAGINA DI ACCESSO --- */
        #loginPage {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('data:image/png;base64, ... [DATI BASE64 IMMAGINE DRONE QUI] ... '); /* Inserire qui l'immagine in Base64 */
            background-size: cover;
            background-position: center;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2000;
        }

        /* SOSTITUISCI IL SEGUENTE SELETTORE CON L'IMMAGINE BASE64 SE DISPONIBILE */
        #loginPage::before {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(0, 0, 0, 0.7); /* Sovrapposizione scura per leggibilità */
            z-index: -1;
        }

        .login-container {
            background-color: rgba(17, 24, 39, 0.9);
            border: 2px solid var(--border-color);
            padding: 40px;
            border-radius: 8px;
            box-shadow: 0 0 25px rgba(0, 255, 204, 0.3);
            text-align: center;
            max-width: 400px;
            width: 90%;
        }

        .login-container h1 {
            font-size: 2rem;
            margin-bottom: 20px;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--text-primary);
        }

        .code-input-group {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            margin-bottom: 20px;
        }

        .code-input {
            width: 80px;
            height: 50px;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid var(--border-color);
            color: var(--text-primary);
            font-family: var(--font-main);
            font-size: 1.5rem;
            text-align: center;
            text-transform: uppercase;
            border-radius: 4px;
        }

        .code-input:focus {
            outline: none;
            border-color: var(--text-primary);
            box-shadow: 0 0 10px rgba(0, 255, 204, 0.5);
        }

        .login-btn {
            display: block;
            width: 100%;
            padding: 15px;
            background: var(--bg-base);
            border: 2px solid var(--border-color);
            color: var(--text-primary);
            font-family: var(--font-main);
            font-size: 1.2rem;
            cursor: pointer;
            text-transform: uppercase;
            transition: 0.2s;
            border-radius: 4px;
        }

        .login-btn:hover {
            background: rgba(0, 255, 204, 0.2);
            box-shadow: 0 0 15px rgba(0, 255, 204, 0.4);
        }

        .login-btn:disabled {
            border-color: #555;
            color: #555;
            cursor: not-allowed;
        }
